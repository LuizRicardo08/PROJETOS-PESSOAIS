<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media-query.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <section>
        <div class="imagem"></div>

        <div class="conteudo">
            <h1>Criar nova conta</h1>

            <p>Já tem uma conata? <a href="#" class="login">Faça o login</a></p>

            <form action="">
                <div class="div-dados nome-sobre">
                    <input type="text" name="nome" id="inome" placeholder="Nome" class="dados">
                    <input type="text" name="sobrenome" id="isobrenome" placeholder="Sobrenome" class="dados">
                </div>

                <div class="div-dados email">
                    <input type="email" name="email" id="iemail" placeholder="E-mail" class="dados">
                </div>

                <div class="div-dados senha">
                    <input type="password" name="senha" id="isenha" placeholder="Senha" class="dados">
                </div>

                <div class="enviar">
                    <input type="submit" value="Criar conta">
                </div>
            </form>

            <div class="linha"><hr><p>Ou entre com</p><hr></div>

            <div class="botoes-entrar">
                <button><i class="fa-brands fa-google"></i>Google</button>
                <button><i class="fa-brands fa-apple"></i>Apple</button>
            </div>

        </div>
    </section>
</body>
</html>
